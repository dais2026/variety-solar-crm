database:
  name: vs-crm-db
  plan: free
  databaseName: vs_crm_db
  ipAllowList: []

services:
  - type: web
    name: vs-crm
    plan: free
    branch: main
    region: oregon
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: vs-crm-db
          property: connectionString
